<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app" aria-label="Calculator">
      <section class="calculator" aria-label="Calculator panel">
        <div class="display" role="group" aria-label="Display">
          <div id="equation" class="equation" aria-live="polite"></div>
          <output
            id="result"
            class="result"
            aria-live="polite"
            aria-label="Current value"
            >0</output
          >
        </div>

        <div class="keys" role="group" aria-label="Calculator keys">
          <button class="key key--utility" data-action="clear" type="button">
            AC
          </button>
          <button class="key key--utility" data-action="sign" type="button">
            +/-
          </button>
          <button class="key key--utility" data-action="percent" type="button">
            %
          </button>
          <button class="key key--op" data-op="/" type="button">÷</button>

          <button class="key" data-digit="7" type="button">7</button>
          <button class="key" data-digit="8" type="button">8</button>
          <button class="key" data-digit="9" type="button">9</button>
          <button class="key key--op" data-op="*" type="button">×</button>

          <button class="key" data-digit="4" type="button">4</button>
          <button class="key" data-digit="5" type="button">5</button>
          <button class="key" data-digit="6" type="button">6</button>
          <button class="key key--op" data-op="-" type="button">−</button>

          <button class="key" data-digit="1" type="button">1</button>
          <button class="key" data-digit="2" type="button">2</button>
          <button class="key" data-digit="3" type="button">3</button>
          <button class="key key--op" data-op="+" type="button">+</button>

          <button class="key key--wide" data-digit="0" type="button">0</button>
          <button class="key" data-action="decimal" type="button">.</button>
          <button class="key key--equals" data-action="equals" type="button">
            =
          </button>
        </div>

        <div class="hint" aria-label="Keyboard shortcuts">
          Keyboard: 0–9, + - * /, Enter =, Backspace = delete, Esc = clear
        </div>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
